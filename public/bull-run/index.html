<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#0b0d0b" />
  <title>BULL RUN — Wild Charge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game"></div>
  <div class="film"></div>
  <div id="flash"></div>

  <header id="hud" class="hidden">
    <div class="brand"><i></i><strong>BULL</strong><span>RUN</span></div>
    <div class="hud-center">
      <div><small>DISTANCE</small><b id="score">0000</b><em>M</em></div>
      <div><small>HIGH SCORE</small><b id="best">0000</b><em>M</em></div>
    </div>
    <div class="charge-wrap"><span>CHARGE</span><div class="charge-track"><i id="energyFill"></i></div></div>
  </header>

  <section id="loading" class="overlay">
    <div class="loading-mark"><i></i><i></i></div>
    <p>SUMMONING THE BULL</p>
    <div class="load-track"><i id="loadFill"></i></div>
  </section>

  <section id="startScreen" class="overlay hidden">
    <div class="overline">THE WILD DOESN'T WAIT</div>
    <h1>BULL<br><span>RUN</span></h1>
    <p>Charge through the old country. Break what stands in your way.</p>
    <button id="startButton"><span>START RUN</span><b>→</b></button>
    <div class="keys">
      <span><kbd>←</kbd><kbd>→</kbd> STEER</span>
      <span><kbd>↑</kbd> JUMP</span>
      <span><kbd>SPACE</kbd> CHARGE</span>
    </div>
    <small class="credit">Bull model by Pixel · CC BY 3.0</small>
  </section>

  <section id="gameOver" class="overlay hidden">
    <div class="overline danger">THE RUN ENDS HERE</div>
    <h2><span id="finalScore">0</span><small>METERS</small></h2>
    <p id="resultLine">The trail remembers every hoofbeat.</p>
    <button id="restartButton"><span>RUN AGAIN</span><b>↻</b></button>
  </section>

  <div id="touchControls" class="hidden">
    <button data-action="left" aria-label="Move left">‹</button>
    <button data-action="jump" aria-label="Jump">↑</button>
    <button data-action="right" aria-label="Move right">›</button>
    <button data-action="dash" class="dash" aria-label="Charge">ϟ</button>
  </div>

  <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/"}}</script>
  <script type="module" src="game.js"></script>
</body>
</html>
